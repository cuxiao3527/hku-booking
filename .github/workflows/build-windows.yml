name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt pyinstaller playwright

      - name: Install Chromium
        run: |
          python -m playwright install chromium

      - name: Find Chromium and set path
        shell: pwsh
        run: |
          $base = "$env:USERPROFILE\AppData\Local\ms-playwright"
          Write-Host "Looking in: $base"
          if (Test-Path $base) {
            Get-ChildItem $base -Directory | ForEach-Object {
              Write-Host "  Found: $($_.Name)"
              $chrome = Join-Path $_.FullName "chrome-win\chrome.exe"
              if (Test-Path $chrome) {
                Write-Host "CHROMIUM: $chrome"
                echo "CHROMIUM_PATH=$chrome" | Out-File -FilePath $env:GITHUB_ENV -Append
              }
            }
          }

      - name: Build EXE
        run: |
          cd backend
          python -m PyInstaller hku-booking.spec --noconfirm --clean
        env:
          CHROMIUM_PATH: ${{ env.CHROMIUM_PATH }}

      - name: Rename EXE
        run: |
          cd backend\dist
          ren HKUBookingWeb.exe 港大预约系统.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 港大预约系统-Windows单文件版
          path: backend\dist\港大预约系统.exe
