name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt pyinstaller playwright

      - name: Install Chromium for Playwright
        run: |
          python -m playwright install --only-shell chromium

      - name: Find Chromium path
        id: find_chromium
        shell: pwsh
        run: |
          $path = Resolve-Path "$env:USERPROFILE\AppData\Local\ms-playwright\chromium_headless_shell-*\chrome-win\chrome.exe"
          echo "CHROMIUM_PATH=$path" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "Found Chromium at: $path"

      - name: Build EXE (with Chromium bundled)
        run: |
          cd backend
          python -m PyInstaller hku-booking.spec --noconfirm --clean
        env:
          CHROMIUM_PATH: ${{ env.CHROMIUM_PATH }}

      - name: Rename EXE
        run: |
          cd backend\dist
          ren HKUBookingWeb.exe 港大预约系统.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 港大预约系统-Windows单文件版
          path: backend\dist\港大预约系统.exe
