name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt pyinstaller playwright

      - name: Install Chromium
        run: |
          python -m playwright install chromium

      - name: Get version
        shell: pwsh
        run: |
          $ver = Get-Content VERSION -TotalCount 1
          echo "APP_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "Version: $ver"

      - name: Find Chromium and set path
        shell: pwsh
        run: |
          $base = "$env:USERPROFILE\AppData\Local\ms-playwright"
          Write-Host "Looking in: $base"
          if (Test-Path $base) {
            Get-ChildItem $base -Directory | Where-Object { $_.Name -match "^chromium-" } | ForEach-Object {
              Write-Host "  Found chromium dir: $($_.Name)"
              # 递归搜索 chrome.exe
              $chrome = Get-ChildItem -Recurse -Filter "chrome.exe" $_.FullName | Select-Object -First 1
              if ($chrome) {
                Write-Host "CHROMIUM: $($chrome.FullName)"
                echo "CHROMIUM_PATH=$($chrome.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
              } else {
                Write-Host "  WARNING: No chrome.exe found in $($_.FullName)"
                Get-ChildItem $_.FullName -Depth 2 | Select-Object -First 10 | ForEach-Object { Write-Host "    $($_.FullName)" }
              }
            }
          } else {
            Write-Host "WARNING: $base does not exist"
          }

      - name: Build EXE
        run: |
          cd backend
          python -m PyInstaller hku-booking.spec --noconfirm --clean
        env:
          CHROMIUM_PATH: ${{ env.CHROMIUM_PATH }}

      - name: Rename EXE
        shell: pwsh
        run: |
          $ver = $env:APP_VERSION
          cd backend\dist
          Rename-Item HKUBookingWeb.exe "港大预约系统_$ver.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 港大预约系统-v1.0.0-Windows单文件版
          path: backend\dist\港大预约系统.exe
